services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      APP_ENV: ${APP_ENV:-production}
      APP_KEY: ${APP_KEY:-base64:0GhPyUG+YSw7ZRUfrLvv7MTycjVXAPAsIKA+NBiFWXQ=}
      APP_URL: ${APP_URL:-http://localhost:8080}
      DB_HOST: ${DB_HOST:-db}
      DB_PORT: ${DB_PORT:-3306}
      DB_DATABASE: ${DB_DATABASE:-ninja}
      DB_USERNAME: ${DB_USERNAME:-ninja}
      DB_PASSWORD: ${DB_PASSWORD:-ninja}
      IN_USER_EMAIL: ${IN_USER_EMAIL:-admin@example.com}
      IN_PASSWORD: ${IN_PASSWORD:-changeme123}
    ports:
      - "8080:80"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ninja_storage:/var/www/html/storage

  db:
    image: mariadb:10.11
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: ninja
      MYSQL_USER: ninja
      MYSQL_PASSWORD: ninja
    healthcheck:
      test: ["CMD", "mariadb-admin", "ping", "-h", "127.0.0.1", "-uroot", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - db_data:/var/lib/mysql

volumes:
  db_data:
  ninja_storage:
