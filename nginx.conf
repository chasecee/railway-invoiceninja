user www-data;
worker_processes auto;
events { worker_connections 1024; }

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;
  sendfile      on;
  keepalive_timeout  65;
  server_tokens off;

  gzip on;
  gzip_comp_level 5;
  gzip_types text/plain text/css application/json application/javascript application/x-javascript text/xml application/xml image/svg+xml;
  gzip_min_length 1000;
  gzip_vary on;

  map $http_x_forwarded_proto $fcgi_https {
    default off;
    https on;
  }

  map $http_x_forwarded_proto $fcgi_server_port {
    default 80;
    https 443;
  }

  server {
    listen 80;
    server_name _;

    root /var/www/html/public;
    index index.php index.html;

    client_max_body_size 20M;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location / {
      try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
      include fastcgi_params;
      fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
      fastcgi_param HTTPS $fcgi_https;
      fastcgi_param REQUEST_SCHEME $http_x_forwarded_proto;
      fastcgi_param HTTP_X_FORWARDED_PROTO $http_x_forwarded_proto;
      fastcgi_param HTTP_X_FORWARDED_PORT $fcgi_server_port;
      fastcgi_param SERVER_PORT $fcgi_server_port;
      fastcgi_pass 127.0.0.1:9000; # php-fpm
      fastcgi_read_timeout 300;
      fastcgi_send_timeout 300;
      fastcgi_buffer_size 128k;
      fastcgi_buffers 4 256k;
      fastcgi_busy_buffers_size 256k;
    }

    location ~* \.(?:css|js|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
      try_files $uri =404;
      access_log off;
      expires 30d;
    }
  }
}
